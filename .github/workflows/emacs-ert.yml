name: Emacs ERT Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Emacs (nox)
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox

      - name: Run ERT tests
        run: |
          emacs -Q --batch \
            --eval "(provide 'gptel)" \
            -l org \
            -l private_dot_config/doom/lisp/my-gptel-org-workflow.el \
            -l private_dot_config/doom/lisp/tests/my-gptel-org-workflow-tests.el \
            -f ert-run-tests-batch-and-exit
